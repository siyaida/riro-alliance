<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIRO Alliance Commerciale — Document Stratégique Complet</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;color:#1a1a2e;background:#fafbfe;line-height:1.7}
h1,h2,h3,h4,h5{font-family:'Playfair Display',Georgia,serif;line-height:1.3;color:#0B1D51}
a{color:#2E86AB;text-decoration:none}
.topbar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,0.06);padding:12px 0}
.topbar .inner{max-width:900px;margin:0 auto;padding:0 32px;display:flex;align-items:center;justify-content:space-between}
.topbar .brand{font-family:'Playfair Display',serif;font-weight:700;font-size:1.2rem;color:#0B1D51}
.topbar .brand span{color:#C9A96E}
.topbar .actions{display:flex;gap:12px;align-items:center}
.topbar a.back{font-size:0.85rem;color:#6b7280}
.topbar a.back:hover{color:#0B1D51}
.btn-print{padding:8px 20px;border-radius:6px;font-weight:600;font-size:0.82rem;cursor:pointer;border:none;background:#0B1D51;color:white;transition:all 0.3s}
.btn-print:hover{background:#2E86AB}
.document{max-width:900px;margin:0 auto;padding:48px 32px 80px}
.document h1{font-size:2.4rem;margin:32px 0 8px;padding-top:24px}
.document h2{font-size:1.8rem;margin:40px 0 12px;padding-top:20px;border-bottom:2px solid rgba(11,29,81,0.08);padding-bottom:12px}
.document h3{font-size:1.3rem;margin:28px 0 10px;color:#2E86AB}
.document h4{font-size:1.1rem;margin:20px 0 8px;font-family:'Inter',sans-serif;font-weight:600}
.document p{margin-bottom:16px;font-size:0.95rem}
.document ul,.document ol{margin:12px 0 16px 24px;font-size:0.95rem}
.document li{margin-bottom:6px}
.document strong{color:#0B1D51}
.document hr{border:none;border-top:2px solid rgba(11,29,81,0.06);margin:32px 0}
.document table{width:100%;border-collapse:collapse;margin:16px 0 24px;font-size:0.88rem}
.document th{background:#0B1D51;color:white;padding:10px 14px;text-align:left;font-weight:600;font-size:0.82rem;text-transform:uppercase;letter-spacing:0.3px}
.document td{padding:10px 14px;border-bottom:1px solid rgba(0,0,0,0.06)}
.document tr:hover td{background:rgba(11,29,81,0.02)}
.document pre{background:#f0f2f8;border-radius:8px;padding:20px;overflow-x:auto;font-size:0.85rem;margin:16px 0;font-family:'Courier New',monospace;line-height:1.5}
.document code{background:rgba(11,29,81,0.06);padding:2px 6px;border-radius:4px;font-size:0.88rem}
.placeholder{text-align:center;padding:120px 32px;min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.placeholder h1{font-size:2rem;margin-bottom:16px;color:#0B1D51}
.placeholder h2{font-size:1.4rem;margin-bottom:20px;color:#2E86AB;border:none;padding:0}
.placeholder p{font-size:1.1rem;color:#6b7280;max-width:500px}
.placeholder .badge{display:inline-block;margin-top:24px;padding:8px 24px;border-radius:20px;background:rgba(11,29,81,0.06);color:#0B1D51;font-weight:600;font-size:0.85rem}
@media print{
  .topbar{display:none !important}
  body{background:white;font-size:11pt}
  .document{padding:0;max-width:100%}
  .document h1{font-size:22pt}
  .document h2{font-size:16pt;break-after:avoid}
  .document h3{font-size:13pt;break-after:avoid}
  .document table{font-size:9pt;break-inside:avoid}
  .document pre{break-inside:avoid}
  a{color:#1a1a2e !important}
  @page{margin:2cm;size:A4}
}
</style>
</head>
<body>
<div class="topbar">
  <div class="inner">
    <a class="brand" href="../../index.html">RI<span>RO</span></a>
    <div class="actions">
      <a href="../../index.html" class="back">&larr; Retour au Hub</a>
      <button class="btn-print" onclick="window.print()">Télécharger PDF</button>
    </div>
  </div>
</div>
<div class="document">

<div class="placeholder">
  <h1>Document Stratégique Complet</h1>
  <h2>RIRO Alliance Commerciale</h2>
  <p>Document en cours de préparation — Bientôt disponible</p>
  <span class="badge">En cours de rédaction</span>
</div>

</div>
</body>
</html>
